name: Android CI

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Decode the Keystore from Secrets
    - name: Decode Keystore
      run: |
        echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore

    # Build Release APK
    - name: Build Release APK
      run: |
        ./gradlew assembleRelease
        DATETIME=$(date +'%Y%m%d-%H%M')
        mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/MoneyWallet-${GITHUB_REF_NAME}-${DATETIME}.apk
        echo "APK_PATH=app/build/outputs/apk/release/MoneyWallet-${GITHUB_REF_NAME}-${DATETIME}.apk" >> $GITHUB_ENV
      env:
        RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
        RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

    # Create/Update Release and Upload Release APK
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ${{ env.APK_PATH }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
